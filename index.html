<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>装置予約システム</title>
  <link rel="stylesheet" href="style_v5.css?v=20260708-noparen" />
</head>
<body>
  <header class="site-header">
    <div>
      <p class="eyebrow">研究室用</p>
      <h1>装置予約システム</h1>
      <p class="subtitle">MOVPE室用 予約サイト</p>
    </div>
    <div class="status" id="status">読み込み中...</div>
  </header>

  <main class="layout">
    <section class="panel full">
      <div class="toolbar">
        <div class="tabs" id="equipmentTabs"></div>
        <div class="toolbar-actions">
          <button type="button" id="prevWeek">← 前週</button>
          <button type="button" id="todayBtn">今週</button>
          <button type="button" id="nextWeek">次週 →</button>
        </div>
      </div>
      <h2 id="weekTitle">YYYY-MM-DD ~ YYYY-MM-DD</h2>
      <div class="calendar-wrap">
        <table class="calendar" id="calendarTable">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section class="panel form-panel">
      <h2>予約フォーム</h2>
      <p class="message" id="message">メッセージ：予約内容を入力してください。</p>
      <form id="reservationForm">
        <label>
          操作*
          <select id="mode" name="mode" required>
            <option value="new">新規予約</option>
            <option value="edit">予約変更</option>
            <option value="delete">予約削除</option>
          </select>
        </label>

        <label>
          予約ID
          <input id="reservationId" name="id" placeholder="予約一覧をクリックすると自動入力" />
        </label>

        <label>
          装置*
          <select id="equipment" name="equipment" required></select>
        </label>

        <label>
          名前*
          <input id="name" name="name" required autocomplete="name" />
        </label>

        <label>
          日付*
          <input id="date" name="date" type="date" required />
        </label>

        <div class="row2">
          <label>
            開始*
            <input id="start" name="start" type="time" required />
          </label>
          <label>
            終了*
            <input id="finish" name="finish" type="time" required />
          </label>
        </div>


        <label>
          使用目的*
          <input id="usage" name="usage" required placeholder="例：アニール、PL測定、洗浄" />
        </label>

        <label>
          備考
          <textarea id="remark" name="remark" rows="3"></textarea>
        </label>

        <label>
          パスワード*
          <input id="pass" name="pass" type="password" required placeholder="新規予約・変更・削除に必要" />
          <small class="field-note">予約時に決めたパスワードを、あとで変更・削除するときにも使います。</small>
        </label>

        <button type="submit" class="primary">送信</button>
      </form>
    </section>

    <section class="panel list-panel">
      <div class="list-header">
        <h2>予約一覧</h2>
        <button type="button" id="reloadBtn">再読み込み</button>
      </div>
      <div class="hint">予約をクリックすると、予約変更・予約削除用にフォームへ反映されます。</div>
      <div id="reservationList" class="reservation-list"></div>
    </section>
  </main>

  <footer>
    <span>データ保存方式：<strong id="dataMode">ローカル</strong></span>
    <span>全員で共有する場合は、<code>config.js</code> にGoogle Apps ScriptのURLを設定してください。</span>
  </footer>

  <script src="config.js?v=20260708-cachefix"></script>
  <script src="script_v5.js?v=20260708-noparen"></script>
</body>
</html>
