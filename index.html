<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#183153">
  <link rel="preconnect" href="https://script.google.com">
  <link rel="preconnect" href="https://script.googleusercontent.com" crossorigin>
  <title>装置予約システム</title>
  <link rel="stylesheet" href="style_v7_timeline.css?v=20260710-v8-oldnames">
</head>
<body>
  <header class="site-header">
    <div>
      <p class="eyebrow">研究室用</p>
      <h1>装置予約システム</h1>
      <p class="subtitle">MOVPE室用 予約サイト</p>
    </div>
    <div id="status" class="status" aria-live="polite">起動中...</div>
  </header>

  <main class="layout">
    <section id="mainViewPanel" class="panel full main-view-panel">
      <div id="equipmentTabs" class="tabs" aria-label="表示切替"></div>

      <div id="calendarToolbar" class="toolbar">
        <label class="month-jump" for="monthPicker">
          <span>月選択</span>
          <input id="monthPicker" type="month">
        </label>
        <div class="toolbar-actions">
          <button type="button" id="prevWeek">← 前週</button>
          <button type="button" id="todayBtn">今週</button>
          <button type="button" id="nextWeek">次週 →</button>
          <button type="button" id="reloadBtn" class="reload-button">再読み込み</button>
        </div>
      </div>

      <div class="calendar-title-row">
        <h2 id="weekTitle">週間予約表</h2>
        <div id="viewLegend" class="view-legend"></div>
      </div>

      <div id="calendarWrap" class="calendar-wrap" tabindex="0" aria-label="週間予約表">
        <div id="timeline" class="timeline"></div>
      </div>

      <div id="emailContentView" class="email-content-view is-hidden">
        <div class="list-header email-content-header">
          <div>
            <h2>メール内容</h2>
            <p class="hint">Gmailで users_movpe7@googlegroups.com 宛てに届いたメール内容を表示します。</p>
          </div>
          <div class="email-toolbar">
            <label class="email-pass-label">メール表示パスワード
              <input id="emailViewPass" type="password" placeholder="未設定なら空欄">
            </label>
            <button type="button" id="emailReloadBtn">メールを読み込み</button>
          </div>
        </div>
        <div id="emailStatus" class="message">メッセージ：未読み込み</div>
        <div id="emailContentList" class="email-list"></div>
      </div>
    </section>

    <section id="formPanel" class="panel">
      <h2>予約フォーム</h2>
      <p id="message" class="message" aria-live="polite">メッセージ：予約内容を入力してください。</p>

      <form id="reservationForm">
        <label>操作*
          <select id="mode" required>
            <option value="new">新規予約</option>
            <option value="edit">予約変更</option>
            <option value="delete">予約削除</option>
          </select>
        </label>

        <label>予約ID
          <input id="reservationId" type="text" readonly>
        </label>

        <label>装置*
          <select id="equipment" required></select>
        </label>

        <label>名前*
          <input id="name" type="text" autocomplete="name" required>
        </label>

        <label>日付*
          <input id="date" type="date" required>
        </label>

        <div class="row2">
          <label>開始*
            <input id="start" type="time" required>
          </label>
          <label>終了*
            <input id="finish" type="time" required>
          </label>
        </div>

        <fieldset class="checkbox-panel">
          <legend>使用目的</legend>
          <div class="maintenance-kind-grid">
            <label class="check-option">
              <input type="radio" name="maintenanceKind" value="maintenance">
              <span>メンテ</span>
            </label>
            <label class="check-option">
              <input type="radio" name="maintenanceKind" value="epi">
              <span>エピ</span>
            </label>
          </div>

          <div id="maintenanceDetailPanel" class="maintenance-detail-panel is-hidden">
            <div class="field-title">メンテ内容</div>
            <div class="check-grid">
              <label class="check-option"><input type="checkbox" name="maintenanceDetails" value="原料交換"><span>原料交換</span></label>
              <label class="check-option"><input type="checkbox" name="maintenanceDetails" value="重故障"><span>重故障</span></label>
              <label class="check-option"><input type="checkbox" name="maintenanceDetails" value="除害停止"><span>除害停止</span></label>
              <label class="check-option"><input type="checkbox" name="maintenanceDetails" value="定常メンテ"><span>定常メンテ</span></label>
            </div>
          </div>
          <span class="field-note">メンテまたはエピを選択してください。メンテの場合は内容を1つ以上選択してください。</span>
        </fieldset>

        <label>備考
          <textarea id="remark" rows="3"></textarea>
        </label>

        <label>パスワード*
          <input id="pass" type="password" required>
          <span class="field-note">変更・削除時にも同じパスワードを使用します。</span>
        </label>

        <button class="primary" type="submit">送信</button>
      </form>
    </section>

    <section id="reservationPanel" class="panel">
      <div class="list-header">
        <h2>予約一覧</h2>
      </div>
      <div id="reservationList" class="reservation-list"></div>
      <p class="hint">予約をクリックすると、変更・削除用にフォームへ反映されます。</p>
    </section>
  </main>

  <footer>
    <span>データ保存方式：<strong id="dataMode">確認中</strong></span>
    <span>表示はキャッシュを先に使い、共有データを裏で更新します。</span>
  </footer>

  <script src="config.js?v=20260710-v8"></script>
  <script src="script_v7_timeline.js?v=20260710-v8-oldnames" defer></script>
</body>
</html>
